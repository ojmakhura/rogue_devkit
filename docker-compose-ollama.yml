version: "3.9"
services:
  ###############################################################################
  # Postgres administration frontend
  ###############################################################################
  ollama:
    image: ollama/ollama:0.20.4
    restart: unless-stopped
    volumes:
      - ${ROGUE_DATA}/ollama:/root/.ollama
    ports:
      - 11434:11434
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      TZ: Africa/Gaborone
    networks:
      rogue-public:
    deploy:    
      placement:
        constraints:
          - node.labels.rogue_ollama == true
      resources:
        reservations:
          generic_resources:
            - discrete_resource_spec:
                kind: 'NVIDIA-GPU'
                #value: 1  # Number of GPUs to reserve
      labels:
        - "traefik.enable=true"
        - "traefik.tcp.routers.rogue-ollama.rule=HostSNI(`*`)"
        - "traefik.tcp.routers.rogue-ollama.entrypoints=postgres"
        - "traefik.tcp.routers.rogue-ollama.service=rogue-ollama"
        - "traefik.tcp.services.rogue-ollama.loadbalancer.server.port=11434"

